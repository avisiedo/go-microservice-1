# Mockery support
# MOCK_DIRS :=
# [x] internal/api/http/private
# [x] internal/api/http/public
# [x] internal/api/http/openapi
# [x] internal/api/http/metrics
# [X] internal/api/http/healthcheck
#
# [x] internal/interface/presenter/echo
#
# [ ] internal/interface/interactor
#
# [ ] internal/interface/repository/event
# [ ] internal/interface/repository/client
# [ ] internal/interface/repository/db
# [x] internal/handler/http
# [ ] internal/infrastructure/event
# [ ] internal/infrastructure/service
# [ ] internal/infrastructure/middleware
---
all: false
dir: '{{.InterfaceDir}}'
filename: mocks.go
force-file-write: true
formatter: goimports
# formatter: fmt
include-auto-generated: false
log-level: info
structname: '{{.Mock}}{{.InterfaceName}}'
pkgname: '{{.SrcPackageName}}'
recursive: false
require-template-schema-exists: true
template: testify
template-schema: '{{.Template}}.schema.json'
packages:
  # github.com/avisiedo/go-microservice-1/internal/interface:
  #   config:
  #     all: true
  #     dir: internal/test/mock/interface
  #     recursive: true
  github.com/avisiedo/go-microservice-1/internal/api/http/openapi:
    config:
      all: true
      dir: internal/test/mock/api/http/openapi
      include-auto-generated: false
  github.com/avisiedo/go-microservice-1/internal/api/http/healthcheck:
    config:
      all: true
      dir: internal/test/mock/api/http/healthcheck
      include-auto-generated: false
  github.com/avisiedo/go-microservice-1/internal/api/http/metrics:
    config:
      all: true
      dir: internal/test/mock/api/http/metrics
      include-auto-generated: false
  github.com/avisiedo/go-microservice-1/internal/api/http/private:
    config:
      all: true
      dir: internal/test/mock/api/http/private
      include-auto-generated: false
  github.com/avisiedo/go-microservice-1/internal/api/http/public:
    config:
      all: true
      dir: internal/test/mock/api/http/public
      include-auto-generated: false
  github.com/avisiedo/go-microservice-1/internal/handler/http:
    config:
      all: true
      dir: internal/test/mock/handler/http
  github.com/avisiedo/go-microservice-1/internal/interfaces/presenter/sync/echo:
    config:
      all: true
      dir: internal/test/mock/interfaces/presenter/sync/echo
      recursive: true
  github.com/avisiedo/go-microservice-1/internal/infrastructure/service:
    config:
      all: true
      dir: internal/test/mock/infrastructure/service
  # github.com/avisiedo/go-microservices-1/internal/infrastructure:
  #   config:
  #     all: true
  #     dir: internal/test/mock/infrastructure

